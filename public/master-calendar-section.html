<!-- Master Calendar Marketing Section - Animated Demo -->
<!-- Add Playfair Display font to your <head>: -->
<!-- <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet"> -->

<style>
  /* Master Calendar Section Styles */
  .master-calendar-section {
    background: #F8F6F3;
    padding: 80px 0 120px;
    position: relative;
    overflow: hidden;
  }

  .master-calendar-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
  }

  .mc-header {
    text-align: center;
    margin-bottom: 60px;
    position: relative;
    z-index: 1;
  }

  .mc-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--brand, #8B7082);
    margin-bottom: 16px;
    padding: 8px 16px;
    background: rgba(139, 112, 130, 0.1);
    border-radius: 20px;
  }

  .mc-title {
    font-family: 'Playfair Display', 'Instrument Serif', Georgia, serif;
    font-size: 3.5rem;
    font-weight: 500;
    color: var(--text-dark, #2a1f26);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .mc-subtitle {
    font-size: 1.25rem;
    color: var(--text-muted, #8a7a85);
    max-width: 500px;
    margin: 0 auto;
  }

  .mc-demo-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  /* Google Calendar Card - Outside 3D wrapper */
  .gcal-card {
    position: absolute;
    left: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    padding: 20px;
    opacity: 0;
    z-index: 10;
    animation: gcal-slide 16s infinite;
  }

  @keyframes gcal-slide {
    0%, 50% { opacity: 0; transform: translateY(-50%) translateX(-40px); }
    56% { opacity: 1; transform: translateY(-50%) translateX(0); }
    68% { opacity: 1; transform: translateY(-50%) translateX(0); }
    75% { opacity: 0; transform: translateY(-50%) translateX(-20px); }
    100% { opacity: 0; transform: translateY(-50%) translateX(-40px); }
  }

  .gcal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #eee;
  }

  .gcal-logo {
    width: 32px;
    height: 32px;
  }

  .gcal-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #333;
  }

  .gcal-title span {
    display: block;
    font-size: 0.75rem;
    font-weight: 400;
    color: #888;
    margin-top: 2px;
  }

  .gcal-event {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: #f8f8f8;
    font-size: 0.85rem;
    color: #333;
    opacity: 1;
    transform: translateX(0);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .gcal-event .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .gcal-event.blue .dot { background: #4285f4; }
  .gcal-event.green .dot { background: #34a853; }
  .gcal-event.yellow .dot { background: #fbbc04; }

  /* Event fly animation */
  .gcal-event.flying {
    opacity: 0;
    transform: translateX(300px) scale(0.5);
  }

  /* 3D Calendar Wrapper */
  .mc-3d-wrapper {
    perspective: 1400px;
    position: relative;
  }

  .mc-calendar-tilt {
    transform: rotateY(-5deg) rotateX(2.5deg);
    transform-style: preserve-3d;
    animation: float-gentle 6s ease-in-out infinite;
    position: relative;
    border-radius: 20px;
    overflow: visible;
  }

  @keyframes float-gentle {
    0%, 100% { transform: rotateY(-5deg) rotateX(2.5deg) translateY(0); }
    50% { transform: rotateY(-5deg) rotateX(2.5deg) translateY(-10px); }
  }

  /* Stacked Calendar Images */
  .mc-calendar-stack {
    position: relative;
    width: 700px;
    height: 600px;
  }

  .mc-cal-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: auto;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(97, 42, 79, 0.15);
    opacity: 0;
    transition: box-shadow 0.5s ease;
  }

  .mc-cal-img.tasks { animation: cal-tasks 16s infinite; }
  .mc-cal-img.content { animation: cal-content 16s infinite; }
  .mc-cal-img.both { animation: cal-both 16s infinite; }

  @keyframes cal-tasks {
    0%, 12.5% { opacity: 1; }
    18.75%, 100% { opacity: 0; }
  }

  @keyframes cal-content {
    0%, 12.5% { opacity: 0; }
    18.75%, 31.25% { opacity: 1; }
    37.5%, 100% { opacity: 0; }
  }

  @keyframes cal-both {
    0%, 31.25% { opacity: 0; }
    37.5%, 87.5% { opacity: 1; }
    93.75%, 100% { opacity: 0; }
  }

  /* Purple glow border on "Both" state */
  .mc-glow-border {
    position: absolute;
    inset: -4px;
    border-radius: 20px;
    background: linear-gradient(135deg, #8B7082, #612a4f, #8B7082);
    opacity: 0;
    z-index: -1;
    animation: glow-border 16s infinite;
    filter: blur(8px);
  }

  @keyframes glow-border {
    0%, 31.25% { opacity: 0; }
    37.5% { opacity: 0.6; }
    50%, 75% { opacity: 0.4; }
    87.5%, 100% { opacity: 0; }
  }

  /* Shimmer sweep effect */
  .mc-shimmer {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255,255,255,0.4) 50%,
      transparent 100%
    );
    transform: translateX(-100%);
    opacity: 0;
    animation: shimmer-sweep 16s infinite;
    pointer-events: none;
  }

  @keyframes shimmer-sweep {
    0%, 35% { transform: translateX(-100%); opacity: 0; }
    37.5% { transform: translateX(-100%); opacity: 1; }
    43.75% { transform: translateX(100%); opacity: 1; }
    44%, 100% { opacity: 0; }
  }

  /* Fake Cursor */
  .mc-cursor {
    position: absolute;
    width: 24px;
    height: 24px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    animation: cursor-path 16s infinite;
  }

  .mc-cursor svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  @keyframes cursor-path {
    0%, 10% {
      opacity: 0;
      top: 40px;
      left: 380px;
    }
    12.5% {
      opacity: 1;
      top: 40px;
      left: 380px;
    }
    15.625% {
      top: 40px;
      left: 380px;
    }
    18.75% {
      top: 40px;
      left: 540px;
    }
    31.25% {
      top: 40px;
      left: 540px;
    }
    87.5% {
      opacity: 1;
    }
    93.75%, 100% {
      opacity: 0;
    }
  }

  /* Click rings */
  .mc-click-ring {
    position: absolute;
    width: 40px;
    height: 40px;
    border: 2px solid var(--brand, #8B7082);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0.3);
  }

  .mc-click-ring.content-tab {
    top: 52px;
    left: 392px;
    animation: click-ring-content 16s infinite;
  }

  .mc-click-ring.both-tab {
    top: 52px;
    left: 552px;
    animation: click-ring-both 16s infinite;
  }

  @keyframes click-ring-content {
    0%, 15% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    15.625% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.5); }
    18.75% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; }
  }

  @keyframes click-ring-both {
    0%, 34% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    34.375% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.5); }
    37.5% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; }
  }

  /* Event landing flashes */
  .mc-event-flash {
    position: absolute;
    width: 60px;
    height: 24px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  .mc-event-flash.blue {
    background: rgba(66, 133, 244, 0.6);
    top: 200px;
    left: 150px;
    animation: event-land-blue 16s infinite;
  }

  .mc-event-flash.green {
    background: rgba(52, 168, 83, 0.6);
    top: 280px;
    left: 320px;
    animation: event-land-green 16s infinite;
  }

  .mc-event-flash.yellow {
    background: rgba(251, 188, 4, 0.6);
    top: 350px;
    left: 500px;
    animation: event-land-yellow 16s infinite;
  }

  @keyframes event-land-blue {
    0%, 62.5% { opacity: 0; transform: scale(0.5); }
    65.625% { opacity: 1; transform: scale(1.2); }
    68.75% { opacity: 0.3; transform: scale(1); }
    75%, 100% { opacity: 0; }
  }

  @keyframes event-land-green {
    0%, 65.625% { opacity: 0; transform: scale(0.5); }
    68.75% { opacity: 1; transform: scale(1.2); }
    71.875% { opacity: 0.3; transform: scale(1); }
    78%, 100% { opacity: 0; }
  }

  @keyframes event-land-yellow {
    0%, 68.75% { opacity: 0; transform: scale(0.5); }
    71.875% { opacity: 1; transform: scale(1.2); }
    75% { opacity: 0.3; transform: scale(1); }
    81%, 100% { opacity: 0; }
  }

  /* Sync Toast */
  .mc-sync-toast {
    position: absolute;
    bottom: 30px;
    right: 30px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(20px) scale(0.9);
    z-index: 100;
    animation: toast-bounce 16s infinite;
  }

  @keyframes toast-bounce {
    0%, 71.875% { opacity: 0; transform: translateY(20px) scale(0.9); }
    75% { opacity: 1; transform: translateY(-5px) scale(1.02); }
    78.125% { opacity: 1; transform: translateY(0) scale(1); }
    87.5% { opacity: 1; transform: translateY(0) scale(1); }
    93.75%, 100% { opacity: 0; transform: translateY(20px) scale(0.9); }
  }

  .mc-toast-icon {
    width: 28px;
    height: 28px;
    background: #34a853;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .mc-toast-icon svg {
    width: 16px;
    height: 16px;
    stroke: white;
    stroke-width: 3;
  }

  .mc-toast-text {
    font-size: 0.9rem;
    font-weight: 600;
    color: #333;
  }

  .mc-toast-text span {
    display: block;
    font-size: 0.8rem;
    font-weight: 400;
    color: #888;
    margin-top: 2px;
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .gcal-card {
      display: none;
    }

    .mc-calendar-stack {
      width: 100%;
      max-width: 600px;
      height: auto;
      aspect-ratio: 7/6;
    }
  }

  @media (max-width: 768px) {
    .mc-title {
      font-size: 2.5rem;
    }

    .mc-subtitle {
      font-size: 1.1rem;
    }

    .mc-calendar-stack {
      max-width: 100%;
    }

    .mc-cursor,
    .mc-click-ring {
      display: none;
    }
  }
</style>

<section class="master-calendar-section">
  <div class="mc-header">
    <div class="mc-label">PLANNER</div>
    <h2 class="mc-title">Master Calendar</h2>
    <p class="mc-subtitle">Plan your content and your tasks — together</p>
  </div>

  <div class="mc-demo-container">
    <!-- Google Calendar Card -->
    <div class="gcal-card" id="gcalCard">
      <div class="gcal-header">
        <svg class="gcal-logo" viewBox="0 0 200 200">
          <rect x="40" y="40" width="120" height="120" rx="10" fill="#fff" stroke="#ddd" stroke-width="4"/>
          <rect x="55" y="30" width="16" height="30" rx="4" fill="#4285f4"/>
          <rect x="130" y="30" width="16" height="30" rx="4" fill="#4285f4"/>
          <rect x="55" y="80" width="30" height="25" rx="4" fill="#ea4335"/>
          <rect x="95" y="80" width="50" height="25" rx="4" fill="#fbbc04"/>
          <rect x="55" y="115" width="50" height="25" rx="4" fill="#34a853"/>
          <rect x="115" y="115" width="30" height="25" rx="4" fill="#4285f4"/>
        </svg>
        <div class="gcal-title">
          Google Calendar
          <span>3 events this week</span>
        </div>
      </div>
      <div class="gcal-event blue" id="event1">
        <span class="dot"></span>
        Dentist
      </div>
      <div class="gcal-event green" id="event2">
        <span class="dot"></span>
        Coffee with Sarah
      </div>
      <div class="gcal-event yellow" id="event3">
        <span class="dot"></span>
        Yoga Class
      </div>
    </div>

    <!-- 3D Calendar Display -->
    <div class="mc-3d-wrapper">
      <div class="mc-calendar-tilt">
        <div class="mc-glow-border"></div>
        <div class="mc-calendar-stack">
          <img src="cal-tasks.png" alt="Tasks Calendar" class="mc-cal-img tasks">
          <img src="cal-content.png" alt="Content Calendar" class="mc-cal-img content">
          <img src="cal-both.png" alt="Combined Calendar" class="mc-cal-img both">
          <div class="mc-shimmer"></div>
        </div>

        <!-- Fake Cursor -->
        <div class="mc-cursor">
          <svg viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1">
            <path d="M5 3l14 10-6 1-3 6-5-17z"/>
          </svg>
        </div>

        <!-- Click Rings -->
        <div class="mc-click-ring content-tab"></div>
        <div class="mc-click-ring both-tab"></div>

        <!-- Event Landing Flashes -->
        <div class="mc-event-flash blue"></div>
        <div class="mc-event-flash green"></div>
        <div class="mc-event-flash yellow"></div>

        <!-- Sync Toast -->
        <div class="mc-sync-toast">
          <div class="mc-toast-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <div class="mc-toast-text">
            Google Calendar synced
            <span>3 events imported</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  // Event fly-out animation with JS for better timing control
  function animateGcalEvents() {
    const events = ['event1', 'event2', 'event3'];
    const delays = [9500, 10000, 10500]; // 9s, 9.5s, 10s into the 16s cycle

    function runCycle() {
      // Reset events
      events.forEach(id => {
        document.getElementById(id)?.classList.remove('flying');
      });

      // Trigger fly animations
      events.forEach((id, i) => {
        setTimeout(() => {
          document.getElementById(id)?.classList.add('flying');
        }, delays[i]);
      });
    }

    // Initial run
    runCycle();

    // Repeat every 16 seconds
    setInterval(runCycle, 16000);
  }

  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', animateGcalEvents);
  } else {
    animateGcalEvents();
  }
</script>
